<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | PEOfficial Tech</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #000000, #001a33);
    font-family: monospace;
    color: #00ffcc;
    text-align: center;
}

/* Form */
form {
    max-width: 400px;
    margin: 50px auto;
    display: flex;
    flex-direction: column;
}

input, textarea {
    margin: 10px 0;
    padding: 12px;
    border: 1px solid #0066ff;
    background: #000;
    color: #00ffcc;
}

button {
    padding: 12px;
    background: #0066ff;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0099ff;
}

/* 🔥 Loading Overlay */
#loading {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #00ffcc;
    font-family: monospace;
    z-index: 9999;
}

/* Spinner */
.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #00ffcc;
    border-top: 5px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h1>Contact Us</h1>

<form id="contactForm" action="https://formspree.io/f/mlgpygdj" method="POST">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

</form>

<!-- 🔥 Loading Screen -->
<div id="loading">
    <div class="spinner"></div>
    <p>Sending message...</p>
</div>

<script>
const form = document.getElementById("contactForm");
const loading = document.getElementById("loading");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    // Show loading
    loading.style.display = "flex";

    fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: {
            'Accept': 'application/json'
        }
    }).then(response => {
        if (response.ok) {
            setTimeout(() => {
                window.location.href = "thankyou.html";
            }, 1500);
        } else {
            loading.style.display = "none";
            alert("Error sending message.");
        }
    });
});
</script>

<footer>
    <p>© 2026 PEOfficial Tech | Void Systems<br>All Rights Reserved</p>
</footer>

</body>
</html>
